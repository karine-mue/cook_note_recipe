### ==============================================
### Qwen3-4B 継続事前学習 - ベースライン（全層r=8）
### unslothの全層r=8と同条件で再現確認用
### ==============================================

### モデル
model_name_or_path: Qwen/Qwen3-4B
trust_remote_code: true

### 学習ステージ
stage: pt
do_train: true

### データセット
dataset_dir: .
dataset: qwen3_cpt_2048
cutoff_len: 2048
preprocessing_num_workers: 4

### QLoRA設定（全層r=8均等 = ベースライン）
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.0
quantization_bit: 4

### 学習パラメータ（unslothと同条件）
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_steps: 50
weight_decay: 0.01
seed: 42

### 精度
bf16: true

### オプティマイザ
optim: adamw_8bit

### ログとチェックポイント
logging_steps: 10
save_steps: 500
output_dir: outputs_lf_baseline

### その他
gradient_checkpointing: true
plot_loss: true
